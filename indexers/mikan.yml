---
id: mikan
name: Mikan
description: "Mikan is a CHINESE Public torrent tracker for ANIME"
language: zh-CN
type: public
encoding: UTF-8
links:
  - https://mikanani.me/

caps:
  categorymappings:
    - {id: 1, cat: TV/Anime, desc: "Anime"}

  modes:
    search: [q]
    tv-search: [q, season, ep]

settings: []

search:
  paths:
    - path: "Home/Search"
  inputs:
    searchstr: "{{ .Keywords }}"
    page: "{{.Page}}"

  rows:
    selector: table.table-striped tbody tr

  fields:
    category:
      text: 1
    title:
      selector: a[href^="/Home/Episode/"]
    details:
      selector: a[href^="/Home/Episode/"]
      attribute: href
    download:
      selector: a[href^="/Download/"]
      attribute: href
    magnet:
      selector: a[data-clipboard-text]
      attribute: data-clipboard-text
    date_day:
      selector: td:nth-child(1):contains("今天"), td:nth-child(1):contains("昨天")
      optional: true
      filters:
        - name: replace
          args: ["昨天", "Yesterday"]
        - name: replace
          args: ["今天", "Today"]
        - name: fuzzytime
    date_raw:
      selector: td:nth-child(4)
      optional: true
    date:
      text: "{{ if .Result.date_raw }}{{ .Result.date_raw }} +08:00{{ else if .Result.date_day }}{{ .Result.date_day }}{{ else }}now{{ end }}"
    size:
      selector: td:has(a[data-clipboard-text]) ~ td
    seeders:
      text: 1
    leechers:
      text: 1
    downloadvolumefactor:
      text: 0
    uploadvolumefactor:
      text: 1
# Engine n/a
