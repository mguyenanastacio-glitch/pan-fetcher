id: acgnx
name: ACG.NX
type: public
language: zh-CN
links:
  - https://share.acgnx.net/

caps:
  categorymappings:
    - {id: anime, cat: TV/Anime}
  modes:
    search: [q]

search:
  paths:
    - path: "search-{{ .Keywords }}-1.html"
  rows:
    selector: "table#listTable tbody tr:has(a[href^=\"magnet:?\"])"
    after: 0
  fields:
    title:
      selector: "td:nth-child(1) a"
    download:
      selector: "a[href^=\"magnet:?\"]"
      attribute: href
    size:
      selector: "td:nth-child(3)"
    date:
      selector: "td:nth-child(4)"
    seeders:
      selector: "td:nth-child(5)"
    leechers:
      selector: "td:nth-child(6)"
    page:
      selector: "td:nth-child(1) a"
      attribute: href
