services:
  pan-fetcher:
    image: mguyenanastacio/pan-fetcher:latest
    # Alternative: ghcr.io/mguyenanastacio-glitch/pan-fetcher:latest
    container_name: pan-fetcher
    restart: unless-stopped
    ports:
      - "8115:8115"
    volumes:
      - ./data:/app/data
      - ./config.toml:/app/config.toml
    environment:
      - TZ=Asia/Shanghai
