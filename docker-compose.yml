version: "3.8"

services:
  pan-fetcher:
    build: .
    container_name: pan-fetcher
    restart: unless-stopped
    ports:
      - "8115:8115"
    volumes:
      - ./data:/app/data
      - ./config.toml:/app/config.toml:ro
      - ./rss.json:/app/rss.json
      - ./indexers:/app/indexers:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8115/api/logs"]
      interval: 30s
      timeout: 5s
      retries: 3
